services:
  db:
    image: postgres:15-alpine
    container_name: shoes_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shoes_backend
    command: >
      sh -c "poetry run alembic upgrade head && 
      poetry run python -m scripts.seed_db && 
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    # Маунты нашего кода
    volumes:
      - ./backend:/app
      # Для быстрых миграций маунтим код инициализированной alembic:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_SURENAME: ${ADMIN_SURENAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PHONE: ${ADMIN_PHONE}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: